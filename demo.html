<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Merlin — live demo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="description" content="A caged, chat-only live demo of Merlin, a personal AI assistant built by Dustin Mooney.">
<script>
  // Bounce immediately if there's no session — before any content paints.
  (function () {
    try {
      var raw = sessionStorage.getItem('merlin_demo');
      if (!raw) { window.location.replace('access.html'); return; }
      var s = JSON.parse(raw);
      if (!s || !s.token) { window.location.replace('access.html'); return; }
      if (s.expiresAt && Date.now() > new Date(s.expiresAt).getTime()) {
        sessionStorage.removeItem('merlin_demo');
        window.location.replace('access.html');
      }
    } catch (e) {
      window.location.replace('access.html');
    }
  })();
</script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="galaxy.js"></script>
<style>
  :root {
    --bg: #0a0c12; --accent: #47c6ff; --accent-2: #8a7bff; --accent-glow: rgba(71,198,255,.45);
    --glass: rgba(122,152,199,.07); --glass-strong: rgba(122,152,199,.12);
    --glass-border: rgba(122,160,220,.18); --glass-border-hover: rgba(122,190,255,.45);
    --text: #e8ecf7; --text-dim: #9aa3bd;
    --amber: #ffb84d; --red: #ff6e6e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    background-image:
      radial-gradient(ellipse 60% 40% at 70% -10%, rgba(71,198,255,.10), transparent 60%),
      radial-gradient(ellipse 50% 35% at 15% 110%, rgba(138,123,255,.10), transparent 60%);
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(122,152,199,.25); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(122,152,199,.4); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  a { color: inherit; }

  .shell { max-width: 900px; margin: 0 auto; padding: 20px 20px 40px; }
  .shell.board-active { max-width: 1440px; }

  /* ── top bar ── */
  .topbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px;
    padding: 10px 16px; margin-bottom: 14px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .orb {
    width: 30px; height: 30px; border-radius: 50%; flex: none;
    background: radial-gradient(circle at 35% 35%, #d6f2ff, var(--accent) 55%, rgba(71,198,255,.15));
    box-shadow: 0 0 20px var(--accent-glow);
    animation: breathe 4.5s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: .92; } 50% { transform: scale(1.07); opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .orb { animation: none; } }
  .topbar h1 { font-size: 16.5px; font-weight: 700; white-space: nowrap; }

  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: .5px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--glass-border); color: var(--text-dim); text-transform: uppercase; white-space: nowrap;
  }
  .badge.promoted { color: var(--accent-2); border-color: var(--accent-2); }
  .badge.standard { color: var(--text-dim); }

  #modelSelect {
    background: var(--glass-strong); color: var(--text); border: 1px solid var(--glass-border);
    border-radius: 10px; padding: 7px 10px; font-size: 13px; font-family: inherit; max-width: 220px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px; text-decoration: none; cursor: pointer;
    font-weight: 700; font-size: 13.5px; border-radius: 999px; padding: 8px 16px; border: none;
    font-family: inherit; transition: transform .15s, box-shadow .25s, opacity .15s;
  }
  .btn.solid {
    color: #06202f; background: linear-gradient(120deg, #7fd0ff, var(--accent));
    box-shadow: 0 6px 24px -10px var(--accent-glow);
  }
  .btn.solid:hover { transform: translateY(-1px); }
  .btn.ghost {
    background: var(--glass-strong); color: var(--text); border: 1px solid var(--glass-border);
  }
  .btn.ghost:hover { border-color: var(--glass-border-hover); }
  .btn.ghost.on { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .5; cursor: default; transform: none; }

  .spacer { flex: 1; }
  .back { color: var(--text-dim); text-decoration: none; font-size: 13.5px; white-space: nowrap; }
  .back:hover { color: var(--text); }

  /* ── geolocation chip ── */
  .geo-chip {
    display: flex; align-items: center; gap: 10px; background: var(--glass);
    border: 1px dashed var(--glass-border); border-radius: 12px; padding: 9px 14px;
    font-size: 13.5px; color: var(--text-dim); margin-bottom: 14px;
  }
  .geo-chip button {
    font-family: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer; border-radius: 999px;
    padding: 5px 12px; border: 1px solid var(--glass-border); background: var(--glass-strong); color: var(--text);
  }
  .geo-chip button:hover { border-color: var(--glass-border-hover); }
  .geo-chip .x { margin-left: auto; background: none; border: none; color: var(--text-dim); font-size: 16px; padding: 0 4px; }

  /* ── chat ── */
  .chat-mount { display: flex; flex-direction: column; height: 100%; }
  .chat-module-inner { display: flex; flex-direction: column; height: 100%; }
  .chat {
    background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px;
    padding: 16px; flex: 1; min-height: 46vh; max-height: 58vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 84%; padding: 11px 15px; border-radius: 15px; font-size: 15px; }
  .msg p { white-space: pre-wrap; }
  .msg a { color: var(--accent); text-decoration: underline; }
  .msg.you { align-self: flex-end; background: linear-gradient(120deg,#2e5f8a,#3a6ea5); color: #eaf6ff; border-bottom-right-radius: 5px; white-space: pre-wrap; }
  .msg.merlin { align-self: flex-start; background: var(--glass-strong); border: 1px solid var(--glass-border); border-bottom-left-radius: 5px; }
  .msg.system { align-self: center; text-align: center; font-size: 13px; color: var(--text-dim); background: none; border: none; max-width: 100%; }

  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 12px 15px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
    animation: pulse 1.1s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes pulse { 0%,60%,100% { opacity: .3; transform: scale(.8); } 30% { opacity: 1; transform: scale(1); } }

  /* ── usage bar ── */
  .usage { margin-top: 12px; }
  .usage-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
  .usage-track { height: 7px; border-radius: 999px; background: var(--glass-strong); overflow: hidden; }
  .usage-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-2), var(--accent)); transition: width .3s ease, background .3s ease; }
  .usage-fill.amber { background: linear-gradient(90deg, #ffcf7a, var(--amber)); }
  .usage-fill.red { background: linear-gradient(90deg, #ff9a9a, var(--red)); }
  .limit-msg { display: none; text-align: center; font-size: 13.5px; color: var(--red); margin-top: 8px; }
  .limit-msg.show { display: block; }

  /* ── composer ── */
  .composer { display: flex; gap: 10px; margin-top: 12px; }
  .composer textarea {
    flex: 1; resize: none; background: var(--glass-strong); color: var(--text);
    border: 1px solid var(--glass-border); border-radius: 13px; padding: 12px 14px; font-size: 15px;
    font-family: inherit; max-height: 120px;
  }
  .composer textarea:focus { border-color: var(--glass-border-hover); outline: none; }
  .composer button {
    flex: none; background: linear-gradient(120deg,#7fd0ff,var(--accent)); color: #06202f;
    border: none; border-radius: 13px; padding: 0 22px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .composer button:disabled { opacity: .5; cursor: default; }

  /* ── galaxy peek (standard tier) ── */
  .galaxy-peek { margin-top: 34px; }
  .galaxy-peek h2 { font-size: 18px; margin-bottom: 4px; }
  .galaxy-peek p { color: var(--text-dim); font-size: 13.5px; margin-bottom: 14px; }
  .galaxy-box {
    background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px;
    height: 360px; position: relative; overflow: hidden;
  }

  /* ── board-lite ── */
  #boardView { display: none; margin-top: 4px; }
  #boardView.active { display: block; }
  #plainView.hidden { display: none; }
  .board-area {
    position: relative; height: 78vh; min-height: 520px;
    background: var(--glass); border: 1px dashed var(--glass-border); border-radius: 18px; overflow: hidden;
  }
  .pane {
    position: absolute; display: flex; flex-direction: column;
    background: rgba(10,12,18,.55); border: 1px solid var(--glass-border); border-radius: 14px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    resize: both; overflow: hidden; min-width: 260px; min-height: 200px;
    box-shadow: 0 12px 40px -20px rgba(0,0,0,.6);
  }
  .pane-head {
    display: flex; align-items: center; gap: 8px; padding: 9px 12px; font-size: 13px; font-weight: 700;
    background: var(--glass-strong); border-bottom: 1px solid var(--glass-border);
    cursor: grab; user-select: none; flex: none;
  }
  .pane-head:active { cursor: grabbing; }
  .pane-body { flex: 1; overflow: auto; padding: 14px; font-size: 13.5px; }
  .pane-body.no-pad { padding: 0; }
  .pane .chat-module-inner { height: 100%; }
  .pane .chat { max-height: none; min-height: 0; flex: 1; border: none; background: none; border-radius: 0; }
  .pane .usage, .pane .composer { padding: 0 14px; }
  .pane .composer { margin-bottom: 12px; }

  /* research / weather staged content */
  .research h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
  .research p { color: var(--text-dim); font-size: 13px; margin-bottom: 10px; }
  .research ol { padding-left: 18px; font-size: 12.5px; color: var(--text-dim); }
  .research ol li { margin-bottom: 6px; }
  .research .stamp { font-size: 11px; color: var(--text-dim); opacity: .7; margin-top: 10px; }

  .wx-card { text-align: center; }
  .wx-loc { font-size: 13px; color: var(--text-dim); margin-bottom: 2px; }
  .wx-temp { font-size: 40px; font-weight: 700; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
  .wx-desc { font-size: 13.5px; color: var(--text-dim); margin-bottom: 14px; }
  .wx-strip { display: flex; justify-content: space-between; gap: 6px; }
  .wx-day { flex: 1; background: var(--glass-strong); border-radius: 10px; padding: 8px 4px; font-size: 11.5px; color: var(--text-dim); }
  .wx-day b { display: block; color: var(--text); font-size: 12.5px; margin: 2px 0; }

  @media (max-width: 720px) {
    .topbar h1 { font-size: 14.5px; }
    #modelSelect { max-width: 150px; }
    .board-area { height: auto; }
    .pane { position: static; width: 100% !important; height: 320px !important; margin-bottom: 14px; resize: vertical; }
  }
</style>
</head>
<body>

<div class="shell" id="shell">
  <div class="topbar">
    <div class="brand">
      <div class="orb" aria-hidden="true"></div>
      <h1>Merlin — live demo</h1>
    </div>
    <span class="badge" id="tierBadge"></span>
    <select id="modelSelect" aria-label="Choose a model"></select>
    <button class="btn ghost" id="boardToggle" style="display:none">⊞ Board</button>
    <div class="spacer"></div>
    <a href="index.html" class="back">← Back to the tour</a>
  </div>

  <div class="geo-chip" id="geoChip" style="display:none">
    <span>📍 Share location for weather questions</span>
    <button id="geoAllow" type="button">Allow</button>
    <button class="x" id="geoDismiss" type="button" aria-label="Dismiss">✕</button>
  </div>

  <!-- ══ PLAIN VIEW ══ -->
  <div id="plainView">
    <div id="chatMount" class="chat-mount"></div>

    <div class="galaxy-peek" id="galaxyPeek">
      <h2>A peek at Merlin's memory galaxy</h2>
      <p>Every fact he remembers becomes a star. Drag to rotate, scroll to zoom, tap a star to read it.</p>
      <div class="galaxy-box" id="galaxyPeekBox"></div>
    </div>
  </div>

  <!-- ══ BOARD-LITE (promoted only) ══ -->
  <div id="boardView">
    <div class="board-area" id="boardArea">
      <div class="pane" id="pane-chat" style="left:0%;top:0%;width:50%;height:50%;">
        <div class="pane-head">💬 Chat</div>
        <div class="pane-body no-pad" id="pane-chat-body"></div>
      </div>
      <div class="pane" id="pane-galaxy" style="left:50%;top:0%;width:50%;height:50%;">
        <div class="pane-head">✨ Memory Galaxy</div>
        <div class="pane-body no-pad" id="pane-galaxy-body"></div>
      </div>
      <div class="pane" id="pane-research" style="left:0%;top:50%;width:50%;height:50%;">
        <div class="pane-head">📚 Research</div>
        <div class="pane-body research" id="pane-research-body"></div>
      </div>
      <div class="pane" id="pane-weather" style="left:50%;top:50%;width:50%;height:50%;">
        <div class="pane-head">🌤 Weather</div>
        <div class="pane-body" id="pane-weather-body"></div>
      </div>
    </div>
  </div>
</div>

<template id="chatModuleTemplate">
  <div class="chat-module-inner">
    <div class="chat" id="chat"></div>
    <div class="usage" id="usage">
      <div class="usage-label"><span>Today's demo allowance</span><span id="usageText">0 / 0</span></div>
      <div class="usage-track"><div class="usage-fill" id="usageFill" style="width:0%"></div></div>
      <div class="limit-msg" id="limitMsg">You've reached today's limit — come back tomorrow (your code renews free).</div>
    </div>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Ask Merlin anything…"></textarea>
      <button id="send">Send</button>
    </div>
  </div>
</template>

<script>
  const API = 'https://api.projectmerlin.app';

  // ── session ──
  var session = null;
  try { session = JSON.parse(sessionStorage.getItem('merlin_demo') || 'null'); } catch (e) { session = null; }
  if (!session || !session.token) { window.location.replace('access.html'); }

  var state = {
    token: session.token,
    tier: session.tier || 'standard',
    models: session.models || [],
    spent: Number(session.spent) || 0,
    cap: Number(session.cap) || 0,
    lat: null,
    lon: null,
    boardActive: false
  };

  // ── build the reusable chat module (chat + usage bar + composer) once ──
  var tpl = document.getElementById('chatModuleTemplate');
  var chatMount = document.getElementById('chatMount');
  chatMount.appendChild(tpl.content.cloneNode(true));

  var chat = document.getElementById('chat');
  var input = document.getElementById('input');
  var send = document.getElementById('send');
  var usageFill = document.getElementById('usageFill');
  var usageText = document.getElementById('usageText');
  var limitMsg = document.getElementById('limitMsg');
  var busy = false;
  var capped = false;

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Basic markdown: bold, links, line breaks, and [n] citation linkification
  // when a "Sources" list is present in the reply.
  function renderMarkdown(raw) {
    var text = escapeHtml(raw);

    // pull out a trailing "Sources:" block, e.g.
    // Sources:\n[1] Title — https://example.com\n[2] ...
    var sourceMap = {};
    var srcMatch = text.match(/(Sources:?[\s\S]*)$/i);
    if (srcMatch) {
      var block = srcMatch[1];
      var lineRe = /\[(\d+)\][^\n<]*?(https?:\/\/[^\s<]+)/g, m;
      while ((m = lineRe.exec(block))) sourceMap[m[1]] = m[2];
    }

    // markdown links [text](url)
    text = text.replace(/\[([^\[\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

    // bare URLs
    text = text.replace(/(^|[\s(])((https?:\/\/[^\s<]+))/g,
      '$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>');

    // bold
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // citation markers [n] -> link to matching source, if not already inside an <a>
    if (Object.keys(sourceMap).length) {
      text = text.replace(/\[(\d+)\](?!\()/g, function (whole, n) {
        if (sourceMap[n]) {
          return '<a href="' + sourceMap[n] + '" target="_blank" rel="noopener noreferrer">[' + n + ']</a>';
        }
        return whole;
      });
    }

    return text.replace(/\n/g, '<br>');
  }

  function bubble(text, who, isHtml) {
    var d = document.createElement('div');
    d.className = 'msg ' + who;
    if (isHtml) d.innerHTML = renderMarkdown(text);
    else d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  function updateUsage() {
    var pct = state.cap > 0 ? Math.min(100, (state.spent / state.cap) * 100) : 0;
    usageFill.style.width = pct + '%';
    usageFill.className = 'usage-fill' + (pct >= 100 ? ' red' : pct > 70 ? ' amber' : '');
    usageText.textContent = '$' + state.spent.toFixed(2) + ' / $' + state.cap.toFixed(2);
    if (pct >= 100) {
      capped = true;
      limitMsg.classList.add('show');
      input.disabled = true; send.disabled = true;
    } else {
      limitMsg.classList.remove('show');
    }
  }

  function badgeAndModels() {
    var badge = document.getElementById('tierBadge');
    if (state.tier === 'promoted') {
      badge.textContent = 'PROMOTED ✨';
      badge.className = 'badge promoted';
      document.getElementById('boardToggle').style.display = '';
    } else {
      badge.textContent = 'STANDARD';
      badge.className = 'badge standard';
    }

    var sel = document.getElementById('modelSelect');
    sel.innerHTML = '';
    var available = document.createElement('optgroup');
    available.label = 'Available';
    var restricted = document.createElement('optgroup');
    restricted.label = 'Restricted — full platform only';
    (state.models || []).forEach(function (m) {
      var opt = document.createElement('option');
      opt.value = m.key;
      opt.textContent = m.label + (m.company ? ' (' + m.company + ')' : '');
      if (m.available) {
        available.appendChild(opt);
      } else {
        opt.disabled = true;
        opt.title = 'Available in the full Merlin platform';
        restricted.appendChild(opt);
      }
    });
    if (available.children.length) sel.appendChild(available);
    if (restricted.children.length) sel.appendChild(restricted);
  }

  badgeAndModels();
  updateUsage();
  if (session.welcome) bubble(session.welcome, 'merlin', true);

  function typingIndicator() {
    var d = document.createElement('div');
    d.className = 'typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  }

  async function submit() {
    var text = input.value.trim();
    if (!text || busy || capped) return;
    busy = true; send.disabled = true; input.disabled = true;
    bubble(text, 'you');
    input.value = ''; input.style.height = 'auto';
    var typing = typingIndicator();

    var payload = { token: state.token, message: text, model: document.getElementById('modelSelect').value };
    if (state.lat != null && state.lon != null) { payload.lat = state.lat; payload.lon = state.lon; }

    try {
      var res = await fetch(API + '/message', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json();
      typing.remove();
      if (data.reply) {
        bubble(data.reply, 'merlin', true);
        if (typeof data.spent === 'number') state.spent = data.spent;
        if (typeof data.cap === 'number') state.cap = data.cap;
        if (data.tier) state.tier = data.tier;
        updateUsage();
      } else if (data.error) {
        bubble(data.error, 'system');
        if (data.expired) {
          sessionStorage.removeItem('merlin_demo');
          setTimeout(function () { window.location.href = 'access.html'; }, 1800);
          return;
        }
        if (data.done) {
          capped = true;
          limitMsg.classList.add('show');
          input.disabled = true; send.disabled = true;
          return;
        }
      }
    } catch (err) {
      typing.remove();
      bubble('Merlin hit a snag — give it another try in a moment.', 'system');
    }
    busy = false;
    if (!capped) { send.disabled = false; input.disabled = false; input.focus(); }
  }

  send.addEventListener('click', submit);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  input.addEventListener('input', function () {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // ── geolocation chip ──
  var geoState = sessionStorage.getItem('merlin_demo_geo');
  var geoChip = document.getElementById('geoChip');
  if (!geoState) {
    geoChip.style.display = 'flex';
  } else if (geoState === 'granted' && navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function (pos) {
      state.lat = pos.coords.latitude; state.lon = pos.coords.longitude;
    }, function () {}, { maximumAge: 600000, timeout: 5000 });
  }
  document.getElementById('geoAllow').addEventListener('click', function () {
    geoChip.style.display = 'none';
    sessionStorage.setItem('merlin_demo_geo', 'granted');
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function (pos) {
        state.lat = pos.coords.latitude; state.lon = pos.coords.longitude;
      }, function () {
        bubble('Could not get your location — weather questions will just ask where you mean.', 'system');
      });
    }
  });
  document.getElementById('geoDismiss').addEventListener('click', function () {
    geoChip.style.display = 'none';
    sessionStorage.setItem('merlin_demo_geo', 'dismissed');
  });

  // ── memory galaxy: standalone peek (standard tier), or inside Board pane (promoted) ──
  var peekHandle = null;
  var boardGalaxyHandle = null;
  if (state.tier !== 'promoted') {
    peekHandle = MerlinGalaxy.mount(document.getElementById('galaxyPeekBox'), { dataUrl: 'demo-galaxy.json' });
  } else {
    document.getElementById('galaxyPeek').style.display = 'none';
  }

  // ── Board-lite (promoted only) ──
  var boardToggle = document.getElementById('boardToggle');
  var plainView = document.getElementById('plainView');
  var boardView = document.getElementById('boardView');
  var shell = document.getElementById('shell');
  var chatModuleMoved = false;

  boardToggle.addEventListener('click', function () {
    state.boardActive = !state.boardActive;
    boardToggle.classList.toggle('on', state.boardActive);
    boardToggle.textContent = state.boardActive ? '⊞ Board (on)' : '⊞ Board';

    if (state.boardActive) {
      plainView.classList.add('hidden');
      boardView.classList.add('active');
      shell.classList.add('board-active');
      if (!chatModuleMoved) {
        document.getElementById('pane-chat-body').appendChild(chatMount.firstElementChild || chatMount);
        chatModuleMoved = true;
      }
      if (!boardGalaxyHandle) {
        boardGalaxyHandle = MerlinGalaxy.mount(document.getElementById('pane-galaxy-body'), { dataUrl: 'demo-galaxy.json' });
      }
      buildResearchPane();
      buildWeatherPane();
      enableDragResize();
    } else {
      boardView.classList.remove('active');
      plainView.classList.remove('hidden');
      shell.classList.remove('board-active');
      if (chatModuleMoved) {
        document.getElementById('chatMount').appendChild(document.getElementById('pane-chat-body').firstElementChild);
        chatModuleMoved = false;
      }
    }
  });

  function buildResearchPane() {
    var el = document.getElementById('pane-research-body');
    if (el.dataset.built) return;
    el.dataset.built = '1';
    el.innerHTML =
      '<h3>Best family password managers, 2026</h3>' +
      '<p>A staged, historical research report — this is what Merlin\'s Deep Research agent produces, ' +
      'archived here for demo purposes rather than generated live.</p>' +
      '<p>Family password managers converged on a common shape by early 2026: shared vaults with per-member ' +
      'permissions, breach monitoring, and passkey support alongside traditional logins. For most households, ' +
      'the deciding factors were fewer than expected — cross-platform reliability, an emergency-access flow ' +
      'a non-technical spouse can actually complete, and transparent pricing that does not balloon at renewal. ' +
      'Three products stood out across review cycles: one for its polished autofill and family dashboard, ' +
      'one for open-source auditability at a lower price, and one bundled inside a broader security suite that ' +
      'made sense for households already paying for that suite\'s antivirus and VPN. Independent lab testing ' +
      'through late 2025 found no critical vulnerabilities in any of the three, though one vendor\'s desktop ' +
      'browser extension required a manual update after a disclosed autofill-hijack advisory. All three now ' +
      'support parental view-only vaults for children\'s accounts, which was inconsistent as recently as 2023.</p>' +
      '<ol>' +
      '<li>Independent Security Labs, "2025 Password Manager Field Test," Dec. 2025 — isl-reports.example/2025-pm-field-test</li>' +
      '<li>Consumer Tech Review, "Family Plans Compared," Jan. 2026 — consumertechreview.example/family-password-plans</li>' +
      '<li>OpenAudit Collective, "Autofill Extension Advisory Tracker," 2025 — openaudit.example/advisories/autofill</li>' +
      '</ol>' +
      '<div class="stamp">Archived report · staged for demo · not live-generated</div>';
  }

  function buildWeatherPane() {
    var el = document.getElementById('pane-weather-body');
    if (el.dataset.built) return;
    el.dataset.built = '1';
    el.innerHTML =
      '<div class="wx-card">' +
      '<div class="wx-loc">Cary, NC</div>' +
      '<div class="wx-temp">☀️ 88°F</div>' +
      '<div class="wx-desc">Sunny, light breeze</div>' +
      '<div class="wx-strip">' +
      '<div class="wx-day">Tue<br><b>89°</b>☀️</div>' +
      '<div class="wx-day">Wed<br><b>85°</b>⛅</div>' +
      '<div class="wx-day">Thu<br><b>82°</b>🌦</div>' +
      '<div class="wx-day">Fri<br><b>86°</b>☀️</div>' +
      '<div class="wx-day">Sat<br><b>90°</b>☀️</div>' +
      '</div></div>';
  }

  // ── drag-by-title-bar for board panes (native CSS resize handles the corner) ──
  function enableDragResize() {
    var area = document.getElementById('boardArea');
    document.querySelectorAll('.pane').forEach(function (pane) {
      var head = pane.querySelector('.pane-head');
      if (head.dataset.bound) return;
      head.dataset.bound = '1';
      var dragging = false, startX, startY, startLeft, startTop;
      head.addEventListener('pointerdown', function (e) {
        if (window.innerWidth <= 720) return; // static stacked layout on mobile
        dragging = true;
        var rect = pane.getBoundingClientRect();
        var areaRect = area.getBoundingClientRect();
        startX = e.clientX; startY = e.clientY;
        startLeft = rect.left - areaRect.left; startTop = rect.top - areaRect.top;
        pane.style.left = startLeft + 'px'; pane.style.top = startTop + 'px';
        pane.style.right = 'auto'; pane.style.bottom = 'auto';
        head.setPointerCapture(e.pointerId);
      });
      head.addEventListener('pointermove', function (e) {
        if (!dragging) return;
        var dx = e.clientX - startX, dy = e.clientY - startY;
        pane.style.left = (startLeft + dx) + 'px';
        pane.style.top = (startTop + dy) + 'px';
      });
      head.addEventListener('pointerup', function () { dragging = false; });
      head.addEventListener('pointercancel', function () { dragging = false; });
    });
  }
</script>
</body>
</html>
